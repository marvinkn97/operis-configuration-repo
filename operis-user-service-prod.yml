spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: password
    url: jdbc:postgresql://postgres-operis-user:5432/operis_user_db

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:9000/realms/operis

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: operis
    password: password

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.value}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://operis-discovery-service:8761/eureka

keycloak:
  server-url: http://keycloak:9000
  realm: operis
  client-id: operis-identity-service
  client-secret: tLWqWvt7tDUxmRoVCnwAAMNYe8SA8Pwu


management:
  server:
    port: 9092
  endpoints:
    web:
      exposure:
        include:
          - health
          - busrefresh
          - prometheus
          - metrics
  prometheus:
    metrics:
      export:
        enabled: true
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    export:
      otlp:
        enabled: true
      enabled: true
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://tempo:4318/v1/traces
          transport: http
  otlp:
    metrics:
      export:
        enabled: false