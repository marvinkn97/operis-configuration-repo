spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: password
    url: jdbc:postgresql://localhost:54321/operis_project_db
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000/realms/operis
          jwk-set-uri: http://localhost:9000/realms/operis/protocol/openid-connect/certs
  rabbitmq:
    host: localhost
    port: 5672
    username: operis
    password: password

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.value}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  server:
    port: 9091
  endpoints:
    web:
      exposure:
        include:
          - health
          - busrefresh
          -
          - prometheus
          - metrics
  prometheus:
    metrics:
      export:
        enabled: true
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    export:
      otlp:
        enabled: true
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
          transport: http
  otlp:
    metrics:
      export:
        enabled: false
logging:
  file:
    name: logs/${spring.application.name}.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
rabbitmq:
  exchange:
    name: project.invitation.exchange
  queue:
    notification-service: project.invitation.notification.queue
    cta-service: project.invitation.cta.queue
  routing:
    new: project.invite
    accept: project.invitation.accept
    reject: project.invitation.reject


---
spring:
  config:
    activate:
      on-profile: docker
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://operis-keycloak:8080/realms/operis
          jwk-set-uri: http://operis-keycloak:8080/realms/operis/protocol/openid-connect/certs
  data:
    redis:
    host: redis
    port: 6379
    password: password

  datasource:
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: password
    url: jdbc:postgresql://postgres-operis-project:5432/operis_project_db

  rabbitmq:
    host: operis-rabbitmq
    port: 5672
    username: operis
    password: password

eureka:
  client:
    serviceUrl:
      defaultZone: http://operis-eureka-server:8761/eureka

management:
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://tempo:4318/v1/traces
          transport: http
